<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Directory Gravity Graph</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
:root{--bg:#f4f6f8;--panel:#fff;--border:#d9d9d9;--text:#111;--muted:#666;--link:rgba(80,80,80,0.22);--shadow:rgba(0,0,0,0.08);--g1:#fff;--g2:#eef2f7}
body.dark{--bg:#0f1115;--panel:#171a21;--border:#2a2f3a;--text:#f5f7fa;--muted:#a0a7b4;--link:rgba(255,255,255,0.12);--shadow:rgba(0,0,0,0.35);--g1:#101319;--g2:#1a1f28}
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{overflow:hidden;background:var(--bg);color:var(--text);transition:background .25s}
#app{display:flex;flex-direction:column;width:100vw;height:100vh}
#graph{flex:1;min-height:0;position:relative}
svg{width:100%;height:100%;background:radial-gradient(circle at center,var(--g1) 0%,var(--g2) 100%)}
.link{stroke:var(--link);stroke-width:1px}
.node{cursor:grab;stroke:rgba(255,255,255,0.65);stroke-width:1.2px}
.node:active{cursor:grabbing}
.label{font-size:10px;fill:var(--text);opacity:.75;pointer-events:none;user-select:none}
#hud{position:absolute;right:12px;bottom:12px;font-size:11px;color:var(--muted);background:var(--panel);padding:6px 10px;border-radius:8px;border:1px solid var(--border);box-shadow:0 8px 24px var(--shadow)}
#controls{display:grid;grid-template-columns:minmax(180px,1fr) auto auto auto auto;align-items:center;gap:10px;background:var(--panel);border-top:1px solid var(--border);padding:12px 14px;box-shadow:0 -8px 24px var(--shadow);z-index:10}
#dirPath{min-width:0;width:100%;border:1px solid var(--border);border-radius:8px;background:var(--panel);color:var(--text);padding:10px 12px;font-size:14px;outline:none}
#dirPath:focus{border-color:#4F46E5;box-shadow:0 0 0 3px rgba(79,70,229,.12)}
button{border:1px solid var(--border);border-radius:8px;background:var(--panel);color:var(--text);padding:10px 12px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap}
button.primary{background:var(--text);color:var(--bg)}
button:hover{opacity:.82}
button:disabled{cursor:not-allowed;opacity:.5}
.toggle{display:flex;align-items:center;gap:8px;color:var(--text);font-size:13px;font-weight:600;white-space:nowrap;cursor:pointer;user-select:none}
.toggle input{width:16px;height:16px;accent-color:#4F46E5}
#status{min-width:170px;max-width:340px;color:var(--muted);font-size:12px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media (max-width:850px){
  #controls{grid-template-columns:1fr auto;align-items:stretch}
  .toggle,#status{grid-column:1/-1}
}
</style>
</head>
<body>
<div id="app">
  <div id="graph">
    <svg></svg>
    <div id="hud">nodes: <b id="hudN">0</b> · links: <b id="hudL">0</b> · scroll to zoom · drag to pan</div>
  </div>
  <form id="controls">
    <input id="dirPath" type="text" placeholder="Directory path" autocomplete="off">
    <button class="primary" id="submitBtn" type="submit">Submit</button>
    <button id="themeBtn" type="button">Light / Dark</button>
    <button id="reheatBtn" type="button">Reheat</button>
    <label class="toggle">
      <input id="ignoreEnvAndDot" type="checkbox" checked>
      Ignore venv and dotfiles
    </label>
    <div id="status">Enter a local folder path and submit.</div>
  </form>
</div>

<script>
const PALETTE={directory:"#4F46E5",file:"#10B981",error:"#EF4444"};
const svg=d3.select("svg");
const gLinks=svg.append("g");
const gNodes=svg.append("g");
const gLabels=svg.append("g");
const graphEl=document.getElementById("graph");

svg.call(d3.zoom().scaleExtent([0.05,8]).on("zoom",e=>{
  gLinks.attr("transform",e.transform);
  gNodes.attr("transform",e.transform);
  gLabels.attr("transform",e.transform);
}));

let simulation=null;
let nodes=[],links=[];
let linksEl,nodesEl,labelsEl;

const $=id=>document.getElementById(id);
const dirPathInput=$("dirPath");
const submitBtn=$("submitBtn");
const ignoreEnvAndDotInput=$("ignoreEnvAndDot");
const statusEl=$("status");
const API_BASE=location.protocol==="file:" || (location.hostname==="localhost" && location.port && location.port!=="3000")
  ? "http://localhost:3000"
  : "";

function W(){return graphEl.clientWidth}
function H(){return graphEl.clientHeight}

function resetGraph(nextNodes,nextLinks){
  if(simulation) simulation.stop();

  nodes=nextNodes;
  links=nextLinks;

  $("hudN").textContent=nodes.length;
  $("hudL").textContent=links.length;

  gLinks.selectAll("*").remove();
  gNodes.selectAll("*").remove();
  gLabels.selectAll("*").remove();

  linksEl=gLinks.selectAll("line").data(links).join("line").attr("class","link");

  nodesEl=gNodes.selectAll("circle").data(nodes).join("circle")
    .attr("class","node")
    .attr("r",d=>d.kind==="directory"?7:5)
    .attr("fill",d=>d.color || PALETTE[d.kind] || PALETTE.file)
    .call(d3.drag()
      .on("start",(e,d)=>{if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y})
      .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y})
      .on("end",(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null})
    );

  nodesEl.append("title").text(d=>d.path || d.label || d.id);

  labelsEl=gLabels.selectAll("text").data(nodes).join("text")
    .attr("class","label")
    .text(d=>d.label ?? d.id);

  updateLabelVisibility();

  simulation=d3.forceSimulation(nodes)
    .force("link",d3.forceLink(links).id(d=>d.id).distance(70))
    .force("charge",d3.forceManyBody().strength(-120))
    .force("center",d3.forceCenter(W()/2,H()/2))
    .force("collision",d3.forceCollide().radius(d=>d.kind==="directory"?11:7))
    .force("x",d3.forceX(W()/2).strength(0.08))
    .force("y",d3.forceY(H()/2).strength(0.08))
    .alphaDecay(0.02)
    .on("tick",tick);
}

function tick(){
  linksEl.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
         .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  nodesEl.attr("cx",d=>d.x).attr("cy",d=>d.y);
  labelsEl.attr("x",d=>d.x+8).attr("y",d=>d.y+4);
}

function updateLabelVisibility(){
  if(!labelsEl) return;
  labelsEl.style("display",nodes.length<=120?null:"none");
}

async function loadDirectoryGraph(){
  const dirPath=dirPathInput.value.trim();
  if(!dirPath){
    statusEl.textContent="Enter a directory path first.";
    dirPathInput.focus();
    return;
  }

  submitBtn.disabled=true;
  statusEl.textContent="Reading directory...";

  try{
    const res=await fetch(`${API_BASE}/api/graph`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({dirPath,ignoreEnvAndDot:ignoreEnvAndDotInput.checked})
    });
    const data=await res.json();
    if(!res.ok) throw new Error(data.error || "Directory request failed");

    resetGraph(data.nodes,data.links);
    const skipped=data.skipped?` Ignored ${data.skipped} hidden/env items.`:"";
    const capped=data.capped?` Showing first ${data.maxNodes} items.`:"";
    statusEl.textContent=`Loaded ${data.nodes.length} nodes from ${data.root}.${skipped}${capped}`;
  }catch(err){
    resetGraph([{id:"error",label:"Error",kind:"error",color:PALETTE.error}],[]);
    statusEl.textContent=err.message;
  }finally{
    submitBtn.disabled=false;
  }
}

$("controls").addEventListener("submit",e=>{
  e.preventDefault();
  loadDirectoryGraph();
});
$("themeBtn").addEventListener("click",()=>document.body.classList.toggle("dark"));
$("reheatBtn").addEventListener("click",()=>{if(simulation)simulation.alpha(0.8).restart()});

window.addEventListener("resize",()=>{
  if(!simulation) return;
  simulation.force("center",d3.forceCenter(W()/2,H()/2));
  simulation.force("x",d3.forceX(W()/2).strength(0.08));
  simulation.force("y",d3.forceY(H()/2).strength(0.08));
  simulation.alpha(0.1).restart();
});

resetGraph([{id:"empty",label:"Submit a directory",kind:"directory",color:PALETTE.directory}],[]);
</script>
</body>
</html>
